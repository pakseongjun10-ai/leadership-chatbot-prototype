<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리더십 코칭 챗봇 · 의사결정용 프로토타입</title>
  <style>
    :root{
      --cobalt:#329BE7;
      --cobalt-hover:#327AB8;
      --cobalt-10:#329BE71A;
      --cobalt-20:#329BE733;
      --cobalt-30:#329BE74D;
      --canvas:#FFFFFF;
      --surface:#FCFCFC;
      --canvas-tint:#F7F7F8;
      --hairline:#EFEFF0;
      --foreground:#313234;
      --body:#464748;
      --muted:#7B7C80;
      --muted-light:#A7A7AA;
      --dark:#242428;
      --black-85:rgba(0,0,0,.85);
      --black-60:rgba(0,0,0,.60);
      --black-30:rgba(0,0,0,.30);
      --black-08:rgba(0,0,0,.08);
      --black-05:rgba(0,0,0,.05);
      --black-03:rgba(0,0,0,.03);
      --success:#31A552;
      --success-10:#31A5521A;
      --caution:#EDBC40;
      --caution-20:#EDBC4033;
      --error:#E94E58;
      --radius-input:8px;
      --radius-card:20px;
      --radius-dialog:20px;
      --ease:cubic-bezier(.3,0,0,1);
      --sidebar:224px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--canvas-tint);
      color:var(--black-85);
      font-family:Inter,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
      font-size:15px;
      line-height:1.5;
      letter-spacing:-.1px;
    }
    button,textarea{font:inherit}
    button{cursor:pointer}
    button:focus-visible,textarea:focus-visible{outline:3px solid var(--cobalt-30);outline-offset:2px}
    button:disabled{cursor:not-allowed;opacity:.4}
    svg{display:block;stroke:currentColor}

    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
    .sidebar{
      position:fixed;inset:0 auto 0 0;width:var(--sidebar);z-index:20;
      display:flex;flex-direction:column;padding:24px 16px;
      background:var(--canvas);border-right:1px solid var(--hairline)
    }
    .brand{display:flex;align-items:center;gap:11px;padding:4px 8px}
    .brand-mark{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:var(--cobalt);color:#fff}
    .brand-title{font-size:15px;line-height:20px;font-weight:700;letter-spacing:-.1px}
    .brand-sub{font-size:12px;line-height:16px;color:var(--black-60)}
    .nav{display:grid;gap:4px;margin-top:32px}
    .nav-item{
      display:flex;align-items:center;gap:10px;width:100%;height:42px;padding:0 12px;
      border:0;border-radius:8px;background:transparent;color:var(--black-60);text-align:left
    }
    .nav-item svg{width:18px;height:18px;stroke-width:1.8}
    .nav-item.active{background:var(--cobalt-10);color:var(--cobalt);font-weight:700}
    .nav-item[aria-disabled="true"]{opacity:.45;cursor:default}
    .sidebar-note{
      margin-top:auto;padding:14px;border-radius:12px;background:var(--canvas-tint);
      color:var(--black-60);font-size:12px;line-height:18px
    }
    .sidebar-note strong{display:block;margin-bottom:5px;color:var(--black-85);font-size:13px}

    .workspace{grid-column:2;min-width:0}
    .topbar{
      position:sticky;top:0;z-index:15;height:72px;display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--hairline);backdrop-filter:blur(12px)
    }
    .topbar-left{display:flex;align-items:center;gap:10px}
    .topbar-title{font-size:18px;line-height:24px;font-weight:700}
    .prototype-badge{padding:5px 8px;border-radius:8px;background:var(--canvas-tint);color:var(--black-60);font-size:11px;font-weight:700}
    .topbar-actions{display:flex;align-items:center;gap:10px}
    .review-toggle{
      display:flex;align-items:center;gap:9px;height:38px;padding:0 10px 0 12px;
      border:1px solid var(--hairline);border-radius:8px;background:#fff;color:var(--black-60);font-size:12px
    }
    .switch{width:34px;height:20px;padding:2px;border:0;border-radius:9999px;background:var(--muted-light);transition:background 150ms var(--ease)}
    .switch::after{content:"";display:block;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 150ms var(--ease)}
    .switch.on{background:var(--cobalt)}
    .switch.on::after{transform:translateX(14px)}
    .avatar{width:34px;height:34px;border-radius:42%;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:11px;font-weight:700}

    .case-bar{max-width:1312px;margin:0 auto;padding:20px 32px 0}
    .case-tabs{display:flex;gap:4px;padding:4px;border:1px solid var(--hairline);border-radius:12px;background:var(--surface);overflow-x:auto}
    .case-tab{
      flex:1;min-width:180px;height:42px;padding:0 14px;border:0;border-radius:8px;background:transparent;
      color:var(--black-60);font-size:13px;font-weight:400;white-space:nowrap;transition:background 150ms var(--ease),color 150ms var(--ease)
    }
    .case-tab:hover{background:var(--black-03);color:var(--black-85)}
    .case-tab.active{background:#fff;color:var(--black-85);font-weight:700;box-shadow:0 0 0 1px var(--black-05)}
    .case-tab.active::before{content:"";display:inline-block;width:7px;height:7px;margin-right:8px;border-radius:50%;background:var(--cobalt);vertical-align:1px}

    .page{max-width:1312px;margin:0 auto;padding:22px 32px 48px}
    .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:18px}
    .eyebrow{display:flex;align-items:center;gap:7px;margin-bottom:6px;color:var(--cobalt);font-size:12px;font-weight:700}
    .page-title{margin:0;font-size:24px;line-height:32px;font-weight:700;letter-spacing:-.4px}
    .page-sub{max-width:760px;margin:6px 0 0;color:var(--black-60);font-size:14px;line-height:20px}
    .page-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .button{
      display:inline-flex;align-items:center;justify-content:center;gap:7px;height:40px;padding:0 14px;
      border:1px solid var(--hairline);border-radius:8px;background:#fff;color:var(--black-85);font-size:13px;font-weight:700;
      transition:background 150ms var(--ease),border-color 150ms var(--ease),color 150ms var(--ease)
    }
    .button svg{width:17px;height:17px;stroke-width:1.8}
    .button:hover{background:var(--canvas-tint)}
    .button.primary{border-color:var(--cobalt);background:var(--cobalt);color:#fff}
    .button.primary:hover{border-color:var(--cobalt-hover);background:var(--cobalt-hover)}
    .button.ghost{border-color:transparent;background:transparent;color:var(--black-60)}
    .button.ghost:hover{background:var(--black-05);color:var(--black-85)}

    .page-grid{display:grid;grid-template-columns:minmax(0,1fr) 326px;gap:20px;align-items:start}
    .card{border:1px solid var(--hairline);border-radius:var(--radius-card);background:var(--canvas)}
    .chat-shell{height:calc(100vh - 222px);min-height:700px;max-height:860px;display:grid;grid-template-rows:64px minmax(0,1fr) auto;overflow:hidden}
    .chat-header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--hairline)}
    .chat-title{display:flex;align-items:center;gap:11px}
    .bot-avatar,.mini-avatar{display:grid;place-items:center;background:var(--cobalt);color:#fff;font-weight:700}
    .bot-avatar{width:36px;height:36px;border-radius:42%;font-size:11px}
    .mini-avatar{flex:0 0 30px;width:30px;height:30px;border-radius:42%;font-size:9px}
    .chat-name{font-size:14px;font-weight:700}
    .chat-status{display:flex;align-items:center;gap:5px;margin-top:2px;color:var(--black-60);font-size:11px}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
    .chat-header-actions{display:flex;align-items:center;gap:4px}
    .icon-button{width:36px;height:36px;display:grid;place-items:center;border:0;border-radius:8px;background:transparent;color:var(--black-60)}
    .icon-button:hover{background:var(--black-05);color:var(--black-85)}
    .icon-button svg{width:18px;height:18px;stroke-width:1.8}

    .chat-log{overflow:auto;padding:22px;background:var(--canvas-tint);scroll-behavior:smooth}
    .empty-state{min-height:100%;display:grid;place-items:center;padding:32px}
    .empty-inner{max-width:560px;text-align:center}
    .empty-icon{width:52px;height:52px;margin:0 auto 18px;border-radius:16px;display:grid;place-items:center;background:var(--cobalt-10);color:var(--cobalt)}
    .empty-icon svg{width:26px;height:26px;stroke-width:1.7}
    .empty-title{margin:0;font-size:22px;line-height:28px;font-weight:700;letter-spacing:-.4px}
    .empty-text{margin:8px 0 18px;color:var(--black-60);font-size:14px;line-height:21px}
    .example-question{
      width:100%;padding:14px 16px;border:1px solid var(--hairline);border-radius:12px;background:#fff;color:var(--black-85);text-align:left;
      font-size:13px;line-height:19px;transition:border-color 150ms var(--ease),background 150ms var(--ease)
    }
    .example-question:hover{border-color:var(--cobalt);background:var(--cobalt-10)}
    .example-label{display:block;margin-bottom:5px;color:var(--cobalt);font-size:11px;font-weight:700}

    .message-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
    .message-row.user{justify-content:flex-end}
    .message-group{max-width:min(78%,690px)}
    .bubble{padding:12px 14px;border-radius:16px;font-size:14px;line-height:21px;white-space:normal}
    .user .bubble{border-bottom-right-radius:6px;background:var(--cobalt);color:#fff}
    .bot .bubble{border:1px solid var(--hairline);border-bottom-left-radius:6px;background:#fff;color:var(--black-85)}
    .message-meta{margin-top:4px;color:var(--muted-light);font-size:10px}
    .user .message-meta{text-align:right}
    .context-lead{display:block;margin-bottom:7px;color:var(--cobalt);font-size:12px;font-weight:700}
    .empathy-lead{display:flex;align-items:center;gap:7px;margin-bottom:7px;color:var(--black-60);font-size:12px;font-weight:700}
    .empathy-lead::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cobalt)}
    .message-row,.summary-card,.senior-card,.action-card,.quick-replies{animation:messageIn 300ms var(--ease) both}
    @keyframes messageIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

    .quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 16px 40px}
    .quick{
      min-height:36px;padding:7px 11px;border:1px solid var(--hairline);border-radius:8px;background:#fff;color:var(--black-85);font-size:12px;
      transition:background 150ms var(--ease),border-color 150ms var(--ease),color 150ms var(--ease)
    }
    .quick:hover{border-color:var(--cobalt);background:var(--cobalt-10);color:var(--cobalt)}
    .quick:disabled{background:var(--surface)}

    .typing{display:flex;gap:4px;align-items:center;height:18px}
    .typing span{width:5px;height:5px;border-radius:50%;background:var(--muted-light);animation:typing 1.1s infinite}
    .typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
    @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

    .summary-card,.senior-card,.action-card{margin:0 0 16px 40px;border:1px solid var(--hairline);border-radius:20px;background:#fff;overflow:hidden}
    .summary-card{padding:16px}
    .summary-title{display:flex;align-items:center;gap:8px;margin-bottom:11px;font-size:14px;font-weight:700}
    .summary-title svg{width:18px;height:18px;color:var(--cobalt);stroke-width:1.8}
    .summary-headline{margin:0 0 10px;font-size:16px;line-height:23px;font-weight:700}
    .summary-list{display:grid;gap:7px;margin:0;padding:0;list-style:none}
    .summary-list li{display:grid;grid-template-columns:90px 1fr;gap:10px;font-size:12px;line-height:18px}
    .summary-list b{color:var(--black-60);font-weight:400}

    .senior-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 16px;border-bottom:1px solid var(--hairline);background:var(--surface)}
    .senior-heading{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700}
    .senior-heading svg{width:19px;height:19px;color:var(--cobalt);stroke-width:1.8}
    .source-badge{padding:5px 8px;border-radius:8px;background:var(--cobalt-10);color:var(--cobalt);font-size:10px;font-weight:700;white-space:nowrap}
    .senior-body{padding:16px}
    .match-reason{padding:11px 12px;border-radius:8px;background:var(--cobalt-10);font-size:12px;line-height:18px}
    .match-reason strong{color:var(--cobalt)}
    .senior-profile{display:flex;align-items:center;gap:9px;margin-top:15px;color:var(--black-60);font-size:12px}
    .profile-mark{width:28px;height:28px;border-radius:42%;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:9px;font-weight:700}
    .experience-label{margin-top:14px;color:var(--black-60);font-size:11px;font-weight:700}
    .experience-text{margin:5px 0 0;font-size:15px;line-height:23px;font-weight:700}
    .senior-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .insight-box{padding:12px;border:1px solid var(--hairline);border-radius:12px;background:var(--surface)}
    .insight-box b{display:block;margin-bottom:5px;font-size:11px;color:var(--black-60)}
    .insight-box span{font-size:12px;line-height:18px}
    .senior-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}

    .action-card{padding:16px}
    .action-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
    .action-title{margin:0;font-size:16px;line-height:23px;font-weight:700}
    .action-kicker{margin-top:3px;color:var(--black-60);font-size:12px}
    .action-step{display:grid;grid-template-columns:30px 1fr;gap:10px;padding:10px 0}
    .action-step+.action-step{border-top:1px solid var(--hairline)}
    .action-num{width:28px;height:28px;border-radius:42%;display:grid;place-items:center;background:var(--dark);color:#fff;font-size:11px;font-weight:700}
    .action-step:first-of-type .action-num{background:var(--cobalt)}
    .action-step strong{font-size:13px;line-height:18px}
    .action-step p{margin:3px 0 0;color:var(--black-60);font-size:12px;line-height:18px}
    .guardrail{display:flex;gap:9px;margin-top:10px;padding:11px 12px;border-radius:8px;background:var(--caution-20);font-size:12px;line-height:18px}
    .guardrail svg{flex:0 0 17px;width:17px;height:17px;margin-top:1px;color:#8A6500;stroke-width:1.8}
    .result-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}

    .composer{padding:14px 16px;border-top:1px solid var(--hairline);background:#fff}
    .composer-context{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px;color:var(--black-60);font-size:11px}
    .composer-row{display:grid;grid-template-columns:minmax(0,1fr) 42px;gap:8px}
    .composer textarea{
      width:100%;height:54px;resize:none;padding:9px 12px;border:1px solid var(--black-05);border-radius:8px;background:#fff;
      color:var(--black-85);font-size:14px;line-height:20px;outline:none
    }
    .composer textarea::placeholder{color:var(--muted-light)}
    .composer textarea:focus{border-color:var(--cobalt);box-shadow:0 0 0 3px var(--cobalt-30)}
    .send{width:42px;height:42px;align-self:center;display:grid;place-items:center;border:0;border-radius:8px;background:var(--cobalt);color:#fff}
    .send:hover{background:var(--cobalt-hover)}
    .send svg{width:19px;height:19px;stroke-width:1.9}

    .decision-panel{position:sticky;top:92px;max-height:calc(100vh - 112px);overflow:auto;padding:18px}
    .decision-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
    .decision-title{font-size:15px;font-weight:700}
    .decision-badge{padding:5px 7px;border-radius:8px;background:var(--canvas-tint);color:var(--black-60);font-size:10px;font-weight:700}
    .decision-desc{margin:0 0 16px;color:var(--black-60);font-size:11px;line-height:17px}
    .stepper{display:grid;gap:0;margin-bottom:16px}
    .step{display:grid;grid-template-columns:24px 1fr;gap:9px;min-height:48px;position:relative}
    .step:not(:last-child)::after{content:"";position:absolute;left:11px;top:25px;bottom:0;width:1px;background:var(--hairline)}
    .step-dot{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--hairline);background:#fff;color:var(--muted-light);font-size:10px;font-weight:700;z-index:1}
    .step.active .step-dot{border-color:var(--cobalt);background:var(--cobalt);color:#fff}
    .step.done .step-dot{border-color:var(--cobalt);background:var(--cobalt-10);color:var(--cobalt)}
    .step-name{padding-top:2px;font-size:12px;font-weight:700}
    .step-note{margin-top:2px;color:var(--black-60);font-size:10px;line-height:15px}
    .decision-section{padding:14px 0;border-top:1px solid var(--hairline)}
    .decision-section h3{margin:0 0 9px;font-size:12px;font-weight:700}
    .fact-list{display:grid;gap:7px;margin:0;padding:0;list-style:none}
    .fact-list li{padding:9px 10px;border-radius:8px;background:var(--surface);font-size:11px;line-height:17px}
    .fact-list b{display:block;margin-bottom:2px;color:var(--black-60);font-weight:400}
    .empty-fact{color:var(--muted-light)}
    .prototype-list{display:grid;gap:7px}
    .prototype-row{display:flex;align-items:flex-start;gap:8px;font-size:11px;line-height:17px}
    .prototype-row svg{flex:0 0 15px;width:15px;height:15px;margin-top:1px;color:var(--cobalt);stroke-width:2}
    .current-choice{display:grid;gap:7px}
    .choice-row{display:grid;grid-template-columns:86px 1fr;gap:8px;font-size:11px;line-height:17px}
    .choice-row b{color:var(--black-60);font-weight:400}
    .prototype-warning{display:flex;gap:8px;margin-top:12px;padding:10px;border-radius:8px;background:var(--caution-20);font-size:10px;line-height:16px}
    .prototype-warning svg{flex:0 0 15px;width:15px;height:15px;margin-top:1px;color:#8A6500;stroke-width:1.8}
    body.review-off .page-grid{grid-template-columns:minmax(0,980px);justify-content:center}
    body.review-off .decision-panel{display:none}

    .modal-backdrop{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;background:var(--black-30)}
    .modal-backdrop.open{display:flex}
    .modal{width:min(760px,100%);max-height:86vh;overflow:auto;border:1px solid var(--black-08);border-radius:var(--radius-dialog);background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.18)}
    .modal-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--hairline);background:#fff;z-index:1}
    .modal-title{margin:0;font-size:18px;line-height:24px;font-weight:700}
    .modal-close{width:34px;height:34px;display:grid;place-items:center;border:0;border-radius:8px;background:transparent;color:var(--black-60)}
    .modal-close:hover{background:var(--black-05)}
    .modal-close svg{width:19px;height:19px;stroke-width:1.8}
    .modal-body{padding:20px}
    .modal-body h4{margin:20px 0 8px;font-size:14px}.modal-body h4:first-child{margin-top:0}
    .modal-body p,.modal-body li{font-size:13px;line-height:20px}
    .modal-body table{width:100%;border-collapse:collapse;margin-top:12px}
    .modal-body th,.modal-body td{padding:10px;border:1px solid var(--hairline);text-align:left;font-size:12px;line-height:18px;vertical-align:top}
    .modal-body th{background:var(--surface);font-weight:700}
    .copy-box{padding:14px;border-radius:8px;background:var(--canvas-tint);white-space:pre-wrap;font-size:13px;line-height:21px}
    .prototype-note{padding:12px;border-radius:8px;background:var(--cobalt-10);font-size:12px;line-height:18px}

    .toast{position:fixed;left:50%;bottom:24px;z-index:120;transform:translate(-50%,12px);padding:10px 14px;border-radius:8px;background:var(--dark);color:#fff;font-size:12px;opacity:0;pointer-events:none;transition:opacity 150ms var(--ease),transform 150ms var(--ease)}
    .toast.show{opacity:1;transform:translate(-50%,0)}

    @media(max-width:1180px){
      :root{--sidebar:76px}
      .sidebar{padding:20px 10px}.brand{justify-content:center}.brand-copy,.nav-item span,.sidebar-note{display:none}.nav-item{justify-content:center;padding:0}.workspace{grid-column:2}
      .page-grid{grid-template-columns:minmax(0,1fr) 300px}.page,.case-bar{padding-left:22px;padding-right:22px}
    }
    @media(max-width:920px){
      .app{display:block}.sidebar{position:static;width:100%;height:64px;display:flex;flex-direction:row;align-items:center;padding:8px 14px;border-right:0;border-bottom:1px solid var(--hairline)}

    function quick(options){return {type:'quick',options};}
    function delay(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
    function isCurrentSequence(key,token){return states[key]&&states[key].sequence===token;}

    async function revealBotSteps(key,token,steps){
      const state=states[key];
      for(const step of steps){
        if(!isCurrentSequence(key,token))return false;
        state.messages.push({type:'typing'});repaint(key);
        await delay(step.wait||520);
        if(!isCurrentSequence(key,token))return false;
        removeTyping(key);state.messages.push(...step.items);repaint(key);
        if(step.pause)await delay(step.pause);
      }
      if(isCurrentSequence(key,token)){state.busy=false;repaint(key);return true;}
      return false;
    }

      const step=Math.min(s.stage,3);
      const steps=[['고민 입력','사용자가 상황을 자연어로 입력'],['최소 확인','답에 영향을 주는 맥락만 확인'],['선배 경험','추천 이유와 적용 조건 노출'],['실행안','상황에 맞는 후속 도구 제공']];
      decisionPanel.innerHTML=`<div class="decision-head"><div class="decision-title">의사결정 정보</div><span class="decision-badge">검토용</span></div><p class="decision-desc">실제 사용자에게는 기본적으로 숨기고, 회의 중 답변 구조를 검토할 때만 표시합니다.</p><div class="stepper">${steps.map((item,index)=>{const status=index<step?'done':index===step?'active':'';return `<div class="step ${status}"><span class="step-dot">${index+1}</span><div><div class="step-name">${item[0]}</div><div class="step-note">${item[1]}</div></div></div>`}).join('')}</div><section class="decision-section"><h3>입력으로 확보한 정보</h3><ul class="fact-list"><li><b>최초 고민</b><span class="${s.question?'':'empty-fact'}">${s.question?esc(s.question):'아직 입력되지 않음'}</span></li><li><b>1차 확인</b><span class="${s.answers[0]?'':'empty-fact'}">${s.answers[0]?esc(s.answers[0]):'아직 확인되지 않음'}</span></li><li><b>2차 확인</b><span class="${s.answers[1]?'':'empty-fact'}">${s.answers[1]?esc(s.answers[1]):'아직 확인되지 않음'}</span></li></ul></section><section class="decision-section"><h3>현재 프로토타입에서 확인 가능</h3><div class="prototype-list"><div class="prototype-row">${icon.check}<span>빈 입력 화면에서 고민을 시작하는 방식</span></div><div class="prototype-row">${icon.check}<span>초기 심리적 공감 후 상황을 재정의하는 응답</span></div><div class="prototype-row">${icon.check}<span>최대 2회의 선택형·직접 입력 핑퐁</span></div><div class="prototype-row">${icon.check}<span>타이핑 표시와 단계별 답변 노출</span></div><div class="prototype-row">${icon.check}<span>선택 결과에 따른 상황 요약과 실행안 분기</span></div><div class="prototype-row">${icon.check}<span>선배 경험의 추천 이유·판단 기준·적용 조건</span></div><div class="prototype-row">${icon.check}<span>면담 질문·업무배분표·상사 보고문 후속 도구</span></div></div></section><section class="decision-section"><h3>현재 적용한 설계안</h3><div class="current-choice"><div class="choice-row"><b>초기 응답</b><span>공감 → 기본 방향 → 확인 질문</span></div><div class="choice-row"><b>답변 노출</b><span>상황 요약 → 선배 경험 → 실행안 순차 표시</span></div><div class="choice-row"><b>확인 질문</b><span>필요 시 최대 2회</span></div><div class="choice-row"><b>선배 조언</b><span>상황 요약 뒤, 실행안 앞</span></div><div class="choice-row"><b>근거 노출</b><span>추천 이유 + 요약 + 적용 조건</span></div><div class="choice-row"><b>상세 산출물</b><span>대화 안의 버튼으로 확장</span></div><div class="choice-row"><b>응답 색상</b><span>Cobalt 단일 브랜드 accent</span></div></div><div class="prototype-warning">${icon.alert}<span>선배 경험 문구는 UX 검토용 예시입니다. 실제 서비스에서는 인터뷰 원문과 AI 요약을 명확히 구분해야 합니다.</span></div></section>`;
    }

    function render(){
      const s=states[activeCase],d=cases[activeCase];
      chatLog.innerHTML=s.messages.length?s.messages.map(renderMessage).join(''):emptyState();
      document.getElementById('composerLabel').textContent=s.stage===0?'고민을 직접 입력하세요':s.stage<3?'선택하거나 직접 답변하세요':'추가 상황을 입력할 수 있습니다';
      chatInput.disabled=s.busy;
      document.getElementById('sendButton').disabled=s.busy;
      renderDecision();
      requestAnimationFrame(()=>{chatLog.scrollTop=chatLog.scrollHeight});
    }

    async function startConversation(text){
      const key=activeCase,s=states[key],d=cases[key];
      if(!text.trim())return;
      s.sequence=(s.sequence||0)+1;const token=s.sequence;
      s.question=text.trim();s.stage=1;s.answers=[];s.seniorIndex=0;s.saved=false;s.busy=true;
      s.messages=[message('user',esc(s.question))];
      chatInput.value='';render();
      await revealBotSteps(key,token,[
        {wait:480,items:[message('bot',empathyReply(d))],pause:240},
        {wait:520,items:[message('bot',`<span class="context-lead">우선 바로 적용할 수 있는 방향입니다</span>${d.immediate}<br><br><strong>${esc(d.q1)}</strong>`),quick(d.o1)]}
      ]);
    }

    async function submit(text){
      const key=activeCase,s=states[key],d=cases[key];
      text=text.trim();if(!text||s.busy)return;
      if(s.stage===0){await startConversation(text);return}
      s.sequence=(s.sequence||0)+1;const token=s.sequence;
      s.messages=s.messages.filter(item=>item.type!=='quick'&&item.type!=='typing');
      s.messages.push(message('user',esc(text)));s.answers.push(text);chatInput.value='';s.busy=true;render();
      if(s.stage===1){
        s.stage=2;
        await revealBotSteps(key,token,[
          {wait:520,items:[message('bot',followupReply(d,text)),quick(d.o2)]}
        ]);
      }else if(s.stage===2){
        s.stage=3;
        await revealBotSteps(key,token,[
          {wait:520,items:[message('bot','말씀해주신 내용을 바탕으로, 먼저 현재 상황을 정리해볼게요.'),{type:'summary'}],pause:300},
          {wait:620,items:[message('bot','비슷한 고민을 겪은 선배 리더의 경험도 함께 찾아봤습니다.'),{type:'senior'}],pause:380},
          {wait:680,items:[message('bot','선배 경험의 판단 기준을 지금 상황에 적용하면, 다음 순서로 움직이는 것이 좋겠습니다.'),{type:'action'}]}
        ]);
      }else{
        await revealBotSteps(key,token,[
          {wait:480,items:[message('bot',`추가로 알려주신 <strong>${esc(text)}</strong>도 중요한 조건이네요. 현재 실행안에서 이 부분을 먼저 확인해보세요.`)]}
        ]);
      }
    }

    function renderTyping(){render();}

    async function runDemo(){
      const key=activeCase,d=cases[key],s=states[key];
      s.sequence=(s.sequence||0)+1;const token=s.sequence;
      s.question=d.example;s.stage=1;s.answers=[];s.seniorIndex=0;s.saved=false;s.busy=true;
      s.messages=[message('user',esc(d.example))];render();showToast('전체 대화 흐름을 순차적으로 재생합니다.');
      if(!await revealBotSteps(key,token,[
        {wait:420,items:[message('bot',empathyReply(d))],pause:180},
        {wait:470,items:[message('bot',`<span class="context-lead">우선 바로 적용할 수 있는 방향입니다</span>${d.immediate}<br><br><strong>${esc(d.q1)}</strong>`)]}
      ]))return;
      if(!isCurrentSequence(key,token))return;
      s.busy=true;s.messages.push(message('user',esc(d.demo[0])));s.answers.push(d.demo[0]);s.stage=2;render();
      if(!await revealBotSteps(key,token,[{wait:470,items:[message('bot',followupReply(d,d.demo[0]))]}]))return;
      if(!isCurrentSequence(key,token))return;
      s.busy=true;s.messages.push(message('user',esc(d.demo[1])));s.answers.push(d.demo[1]);s.stage=3;render();
      await revealBotSteps(key,token,[
        {wait:500,items:[message('bot','말씀해주신 내용을 바탕으로, 먼저 현재 상황을 정리해볼게요.'),{type:'summary'}],pause:250},
        {wait:580,items:[message('bot','비슷한 고민을 겪은 선배 리더의 경험도 함께 찾아봤습니다.'),{type:'senior'}],pause:320},
        {wait:640,items:[message('bot','선배 경험의 판단 기준을 지금 상황에 적용하면, 다음 순서로 움직이는 것이 좋겠습니다.'),{type:'action'}]}
      ]);
    }

    function cycleSenior(){
      const s=states[activeCase],d=cases[activeCase];s.seniorIndex=(s.seniorIndex+1)%d.senior.length;render();showToast('다른 선배 경험으로 바꿨습니다.');
    }

    function openModal(title,html){
      document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('detailModal').classList.add('open');document.getElementById('modalClose').focus();
    }
    function closeModal(){document.getElementById('detailModal').classList.remove('open')}
    let toastTimer;function showToast(text){const toast=document.getElementById('toast');toast.textContent=text;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1800)}

    document.addEventListener('click',event=>{
      const tab=event.target.closest('.case-tab');if(tab){setCase(tab.dataset.case);return}
      if(event.target.closest('[data-example]')){startConversation(cases[activeCase].example);return}
      const reply=event.target.closest('[data-reply]');if(reply){submit(reply.dataset.reply);return}
      if(event.target.closest('[data-another-senior]')){cycleSenior();return}
      if(event.target.closest('[data-context]')){const senior=seniorData();openModal('선배 경험 원문 맥락',`<div class="prototype-note">현재는 의사결정용 프로토타입이므로 실제 인터뷰 원문 대신, 원문이 연결될 위치와 표시 방식을 보여줍니다.</div><h4>경험자 맥락</h4><p>${esc(senior.profile)}</p><h4>경험 요약</h4><p>${esc(senior.experience)}</p><h4>실제 서비스 적용 시</h4><ul><li>원문 발화와 AI 요약을 시각적으로 구분</li><li>조직·직책 등 개인 식별 정보는 비식별화</li><li>현재 사용자 상황과 다른 조건도 함께 표시</li></ul>`);return}
      if(event.target.closest('[data-detail]')){openModal(cases[activeCase].detailTitle,detailHtml());return}
      if(event.target.closest('[data-save]')){states[activeCase].saved=true;render();showToast('실행계획에 저장한 상태를 표시했습니다.');return}
      if(event.target.id==='detailModal')closeModal();
    });

    document.getElementById('sendButton').addEventListener('click',()=>submit(chatInput.value));
    chatInput.addEventListener('keydown',event=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submit(chatInput.value)}});
    document.getElementById('resetButton').addEventListener('click',()=>{resetCase();showToast('현재 CASE를 초기화했습니다.');chatInput.focus()});
    document.getElementById('demoButton').addEventListener('click',runDemo);
    document.getElementById('scrollBottomButton').addEventListener('click',()=>chatLog.scrollTo({top:chatLog.scrollHeight,behavior:'smooth'}));
    document.getElementById('modalClose').addEventListener('click',closeModal);
    document.addEventListener('keydown',event=>{if(event.key==='Escape')closeModal()});
    document.getElementById('reviewSwitch').addEventListener('click',event=>{const on=event.currentTarget.classList.toggle('on');event.currentTarget.setAttribute('aria-pressed',on);document.body.classList.toggle('review-off',!on)});

    setCase('case1');
  </script>
</body>
</html>
